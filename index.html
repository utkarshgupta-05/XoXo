<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <title>XoXo</title>
</head>

<body>
    <h1 class="main-title">XOXO</h1>

    <div id="namePrompt" class="hidden">
        <h2>Welcome!</h2>
        <p style="margin-bottom: 15px; opacity: 0.9;">Choose a name to start playing.</p>
        <input type="text" id="playerNameInput" placeholder="Enter your name" maxlength="14" autocomplete="off" spellcheck="false" onkeypress="handleNameKeyPress(event)" />
        <button class="btn" onclick="submitName()">Start Game</button>
    </div>

    <div id="lobby" class="hidden">
        <h2>XoXo Online</h2>
        
        <div style="margin-bottom: 20px;">
            <span id="lobbyGreeting" style="opacity: 0.9;">Create a new game or join your friend's room</span>
            <button class="edit-name-btn" onclick="editName()">✎ Edit Name</button>
        </div>

        <button class="btn" onclick="createRoom()">Create Room</button>

        <div style="margin-top: 16px;">
            <input type="text" id="joinCodeInput" placeholder="Enter Room Code" maxlength="6" onkeypress="handleJoinKeyPress(event)" />
            <button class="btn" onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <div id="waitingRoom" class="hidden">
        <div id="waitRoomCode"></div>
        <h2>Waiting for opponent...</h2>
        <div id="waitPlayers" class="players-status"></div>
        <button class="btn btn-leave" onclick="leaveRoom()">Leave Room</button>
    </div>

    <div id="game" class="hidden">
        <div id="roomCodeDisplay"></div>

        <div id="playersBar" class="players-status"></div>

        <div id="status"></div>

        <div class="container">
            <div class="grid">
                <div class="row">
                    <div onclick="handleClick(this)" id="0" class="col"></div>
                    <div onclick="handleClick(this)" id="1" class="col"></div>
                    <div onclick="handleClick(this)" id="2" class="col"></div>
                </div>
                <div class="row">
                    <div onclick="handleClick(this)" id="3" class="col"></div>
                    <div onclick="handleClick(this)" id="4" class="col"></div>
                    <div onclick="handleClick(this)" id="5" class="col"></div>
                </div>
                <div class="row">
                    <div onclick="handleClick(this)" id="6" class="col"></div>
                    <div onclick="handleClick(this)" id="7" class="col"></div>
                    <div onclick="handleClick(this)" id="8" class="col"></div>
                </div>
            </div>

            <div id="rematchInfo" class="rematch-info"></div>

            <div class="controls">
                <button class="btn" id="rematchBtn" onclick="requestRematch()">New Game</button>
                <button class="btn btn-leave" onclick="leaveRoom()">Leave Room</button>
            </div>
        </div>
    </div>

    <button id="chatFab" class="chat-fab hidden" onclick="toggleChat()">
        💬
        <span id="chatBadge" class="chat-badge hidden"></span>
    </button>

    <div id="chatPanel" class="closed">
        <div class="chat-header">
            <h3>Room Chat</h3>
            <button class="close-chat" onclick="toggleChat()">✖</button>
        </div>
        <div id="chatMessages" class="chat-messages"></div>
        
        <div class="chat-input-area">
            <input type="text" id="chatInput" placeholder="Type a message..." maxlength="100" autocomplete="off" onkeypress="handleChatKeyPress(event)" oninput="handleChatInput()" />
            
            <div class="chat-action-wrapper">
                <button id="micBtn" class="chat-action-btn" onclick="toggleRecording()">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="#202c33"><path d="M12 14c1.66 0 3-1.34 3-3V5c0-1.66-1.34-3-3-3S9 3.34 9 5v6c0 1.66 1.34 3 3 3zm5-3c0 2.76-2.24 5-5 5s-5-2.24-5-5H5c0 3.53 2.81 6.43 6.32 6.92V21h1.36v-3.08C16.19 17.43 19 14.53 19 11h-2z"/></svg>
                </button>
                <button id="sendBtn" class="chat-action-btn hidden" onclick="sendChatMessage()">
                    <svg viewBox="0 0 24 24" width="22" height="22" fill="#202c33" style="margin-left: 2px;"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="modalOverlay" class="hidden">
        <div id="modalBox">
            <p id="modalMessage"></p>
            <div class="controls modal-controls">
                <button class="btn" id="modalOkBtn">OK</button>
                <button class="btn btn-leave hidden" id="modalCancelBtn">Cancel</button>
                <button class="btn hidden" id="modalYesBtn">Yes</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
