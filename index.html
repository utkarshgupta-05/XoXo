<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" href="icon.png" type="image/png">
    <link rel="stylesheet" href="style.css">
    <title>XoXo</title>
</head>

<body>
    <h1 class="main-title">XOXO</h1>

    <!-- ====== NAME PROMPT ====== -->
    <div id="namePrompt" class="hidden">
        <h2>Enter Your Name</h2>
        <input type="text" id="playerNameInput" placeholder="Your name" maxlength="14" />
        <button class="btn" onclick="submitName()">Continue</button>
    </div>

    <!-- ====== LOBBY ====== -->
    <div id="lobby" class="hidden">
        <h2>XoXo Online</h2>
        <p id="lobbyGreeting">Create a new game or join your friend's room</p>

        <button class="btn" onclick="createRoom()">Create Room</button>

        <div style="margin-top: 16px;">
            <input type="text" id="joinCodeInput" placeholder="Enter Room Code" maxlength="6" />
            <button class="btn" onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <!-- ====== WAITING ROOM ====== -->
    <div id="waitingRoom" class="hidden">
        <div id="waitRoomCode"></div>
        <h2>Waiting for opponent...</h2>
        <div id="waitPlayers" class="players-status"></div>
        <button class="btn btn-leave" onclick="leaveRoom()">Leave Room</button>
    </div>

    <!-- ====== GAME ====== -->
    <div id="game" class="hidden">
        <div id="roomCodeDisplay"></div>

        <!-- Live player + online status bar -->
        <div id="playersBar" class="players-status"></div>

        <div id="status"></div>

        <div class="container">
            <div class="grid">

                <div class="row">
                    <div onclick="handleClick(this)" id="0" class="col"></div>
                    <div onclick="handleClick(this)" id="1" class="col"></div>
                    <div onclick="handleClick(this)" id="2" class="col"></div>
                </div>

                <div class="row">
                    <div onclick="handleClick(this)" id="3" class="col"></div>
                    <div onclick="handleClick(this)" id="4" class="col"></div>
                    <div onclick="handleClick(this)" id="5" class="col"></div>
                </div>

                <div class="row">
                    <div onclick="handleClick(this)" id="6" class="col"></div>
                    <div onclick="handleClick(this)" id="7" class="col"></div>
                    <div onclick="handleClick(this)" id="8" class="col"></div>
                </div>

            </div>

            <!-- Rematch status text -->
            <div id="rematchInfo" class="rematch-info"></div>

            <div class="controls">
                <button class="btn" id="rematchBtn" onclick="requestRematch()">New Game</button>
                <button class="btn btn-leave" onclick="leaveRoom()">Leave Room</button>
            </div>
        </div>
    </div>

    <script type="module" src="script.js"></script>
</body>

</html>
